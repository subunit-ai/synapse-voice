# transcribe.subunit.ai service — append/merge into ~/subunit/subunit-engine/docker-compose.yml
# (or run standalone for testing: docker compose -f server/docker-compose.yml up)

services:
  transcribe-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transcribe-api
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - WHISPER_MODEL=large-v3-turbo
      - WHISPER_DEVICE=auto
      - TRANSCRIBE_API_KEY=${TRANSCRIBE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CLEANUP_MODEL=${CLEANUP_MODEL:-anthropic/claude-haiku-4-5}
      - ACCOUNTS_DB=/data/accounts.db
      # v0.5.0: Email-verified signup needs Resend to deliver the
      # 6-digit verification code.  Falls back to a clear server error
      # if missing — better than silent drop.
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-Sonar <hello@subunit.ai>}
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "127.0.0.1:8005:8005"
    volumes:
      - ./data:/data
    networks:
      - subunit-network

networks:
  subunit-network:
    external: true
    name: subunit-engine_subunit-network
