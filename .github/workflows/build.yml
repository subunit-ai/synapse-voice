name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (AppImage + tarball)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: System deps for PyQt6 + audio + AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libdbus-1-3 libfontconfig1 \
            libportaudio2 libasound2 \
            xvfb fuse libfuse2 file

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run smoke test (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          xvfb-run -a python tests/smoke_test.py || echo "smoke skipped"

      - name: Build PyInstaller bundle
        run: |
          pyinstaller --clean --noconfirm dist-build/synapse-voice.spec

      - name: Tarball
        run: |
          tar -C dist -czf dist/synapse-voice-linux-x86_64.tar.gz synapse-voice

      - name: Build AppImage
        env:
          QT_QPA_PLATFORM: offscreen
          DISPLAY: ':99'
        run: |
          # appimagetool extraction needs FUSE — fall back to --appimage-extract-and-run on CI
          mkdir -p $HOME/.local/bin
          curl -fsSL -o $HOME/.local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x $HOME/.local/bin/appimagetool
          export PATH="$HOME/.local/bin:$PATH"
          # Run via xvfb so PyQt6 icon-gen step works
          xvfb-run -a bash dist-build/build-appimage.sh || {
            echo "::warning::AppImage build failed, see log"
            exit 0
          }

      - name: Upload Linux artefacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            dist/synapse-voice-linux-x86_64.tar.gz
            dist/SynapseVoice-x86_64.AppImage
          if-no-files-found: error

  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywin32

      - name: Build PyInstaller bundle
        run: |
          pyinstaller --clean --noconfirm dist-build\synapse-voice.spec

      - name: Zip distribution
        run: |
          Compress-Archive -Path dist\synapse-voice\* -DestinationPath dist\synapse-voice-windows-x86_64.zip
        shell: pwsh

      - name: Upload Windows artefacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist\synapse-voice-windows-x86_64.zip
          if-no-files-found: error

  release:
    name: Release
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: List artefacts
        run: ls -la artefacts/**/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artefacts/linux-x86_64/synapse-voice-linux-x86_64.tar.gz
            artefacts/linux-x86_64/SynapseVoice-x86_64.AppImage
            artefacts/windows-x86_64/synapse-voice-windows-x86_64.zip
