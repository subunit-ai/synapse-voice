name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (AppImage + tarball)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: System deps for PyQt6 + audio + AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libdbus-1-3 libfontconfig1 \
            libportaudio2 libasound2 \
            xvfb fuse libfuse2 file

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run smoke test (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          xvfb-run -a python tests/smoke_test.py || echo "smoke skipped"

      - name: Build PyInstaller bundle
        run: |
          pyinstaller --clean --noconfirm dist-build/synapse-voice.spec

      - name: Tarball
        run: |
          tar -C dist -czf dist/synapse-voice-linux-x86_64.tar.gz synapse-voice

      - name: Build AppImage
        env:
          QT_QPA_PLATFORM: offscreen
          DISPLAY: ':99'
        run: |
          # appimagetool extraction needs FUSE — fall back to --appimage-extract-and-run on CI
          mkdir -p $HOME/.local/bin
          curl -fsSL -o $HOME/.local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x $HOME/.local/bin/appimagetool
          export PATH="$HOME/.local/bin:$PATH"
          # Run via xvfb so PyQt6 icon-gen step works
          xvfb-run -a bash dist-build/build-appimage.sh || {
            echo "::warning::AppImage build failed, see log"
            exit 0
          }

      - name: Upload Linux artefacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            dist/synapse-voice-linux-x86_64.tar.gz
            dist/SynapseVoice-x86_64.AppImage
          if-no-files-found: error

  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywin32

      - name: Build PyInstaller bundle
        run: |
          pyinstaller --clean --noconfirm dist-build\synapse-voice.spec

      - name: Zip distribution
        run: |
          Compress-Archive -Path dist\synapse-voice\* -DestinationPath dist\synapse-voice-windows-x86_64.zip
        shell: pwsh

      - name: Install NSIS
        run: |
          choco install nsis -y --no-progress
        shell: pwsh

      - name: Resolve installer version
        id: ver
        run: |
          # NSIS VIProductVersion requires X.X.X.X numeric — keep the version
          # purely numeric. Tag pushes get the real tag; everything else gets
          # a 0.0.0 placeholder (the binary's __version__ still tracks the
          # real Python package version).
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(\d+\.\d+\.\d+)$') {
            $version = $matches[1]
          } else {
            $version = "0.0.0"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $version"
        shell: pwsh

      - name: Build NSIS installer
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) { $nsis = "makensis.exe" }
          & $nsis "/DAPP_VERSION=${{ steps.ver.outputs.version }}" dist-build\installer.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem dist\SynapseVoice-Setup-*.exe
        shell: pwsh

      - name: Upload Windows artefacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            dist\synapse-voice-windows-x86_64.zip
            dist\SynapseVoice-Setup-*.exe
          if-no-files-found: error

  build-windows-arm64:
    name: Windows ARM64 (.exe)
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12 (ARM64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'arm64'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-arm64-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        # Use pwsh with explicit error handling.  Previous build silently
        # produced a 7 MB stub when pip resolution failed (no PyQt6/Whisper
        # in the bundle), then crashed at runtime.  $ErrorActionPreference
        # makes pip stderr propagate as a fatal job failure instead.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) { throw "pip install -r requirements.txt failed" }
          pip install pyinstaller pywin32
          if ($LASTEXITCODE -ne 0) { throw "pip install pyinstaller pywin32 failed" }
          # Sanity: the local backend MUST be importable on this arch,
          # otherwise the bundle will crash at runtime exactly like v0.4.1.
          python -c "from onnx_asr import load_model; print('onnx-asr OK')"
          python -c "from PyQt6 import QtCore; print('PyQt6 OK')"
          python -c "import onnxruntime; print('onnxruntime', onnxruntime.__version__)"

      - name: Build PyInstaller bundle
        run: |
          pyinstaller --clean --noconfirm dist-build\synapse-voice.spec

      - name: Smoke test the bundle size
        # The previous broken ARM build was 7 MB (no PyQt6, no Whisper,
        # just a Python stub).  A healthy bundle on Win-ARM64 should be
        # at least ~80 MB once onnxruntime + PyQt6 are bundled.  Hard-fail
        # below that threshold so we never ship another stub.
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\synapse-voice\synapse-voice.exe
          if (-not $exe) { throw "synapse-voice.exe missing from PyInstaller output" }
          $totalBytes = (Get-ChildItem dist\synapse-voice -Recurse -File | Measure-Object Length -Sum).Sum
          Write-Host "Bundle total size: $totalBytes bytes"
          if ($totalBytes -lt 50000000) {
            throw "Bundle suspiciously small ($totalBytes bytes) — Whisper / Qt deps likely missing.  Refusing to ship."
          }

      - name: Zip distribution
        run: |
          Compress-Archive -Path dist\synapse-voice\* -DestinationPath dist\synapse-voice-windows-arm64.zip
        shell: pwsh

      - name: Install NSIS
        run: |
          choco install nsis -y --no-progress
        shell: pwsh

      - name: Resolve installer version
        id: ver
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(\d+\.\d+\.\d+)$') {
            $version = $matches[1]
          } else {
            $version = "0.0.0"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $version"
        shell: pwsh

      - name: Build NSIS installer
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) { $nsis = "C:\Program Files\NSIS\makensis.exe" }
          if (-not (Test-Path $nsis)) { $nsis = "makensis.exe" }
          & $nsis "/DAPP_VERSION=${{ steps.ver.outputs.version }}" "/DARCH_SUFFIX=-arm64" dist-build\installer.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem dist\SynapseVoice-Setup-*-arm64.exe
        shell: pwsh

      - name: Upload Windows ARM64 artefacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: |
            dist\synapse-voice-windows-arm64.zip
            dist\SynapseVoice-Setup-*-arm64.exe
          if-no-files-found: error

  build-macos-arm64:
    name: macOS Apple Silicon (.dmg)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12 (arm64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'arm64'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-macos-arm64-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate .icns from logo PNG
        # macOS app bundles want a real .icns. iconutil + sips are built-in
        # so we skip Pillow and just shell-out — same approach the Apple
        # docs recommend for command-line builds.
        run: |
          set -e
          ICONSET="icons/Sonar.iconset"
          mkdir -p "$ICONSET"
          SRC="icons/subunit-logo.png"
          for s in 16 32 64 128 256 512; do
            sips -z $s $s "$SRC" --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
            d=$((s * 2))
            sips -z $d $d "$SRC" --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o icons/subunit-logo.icns
          ls -la icons/subunit-logo.icns

      - name: Build PyInstaller bundle
        run: |
          pyinstaller --clean --noconfirm dist-build/synapse-voice.spec

      - name: Smoke test the .app bundle
        # Same hard-fail floor as the Win-ARM build — a stub-bundle here
        # would also be ~7 MB and only fail at runtime in users' Macs.
        run: |
          set -e
          APP="dist/Sonar.app"
          if [ ! -d "$APP" ]; then
            echo "::error::Sonar.app missing from PyInstaller output"
            ls -la dist
            exit 1
          fi
          BYTES=$(du -sk "$APP" | awk '{print $1 * 1024}')
          echo "Bundle total size: $BYTES bytes"
          if [ "$BYTES" -lt 50000000 ]; then
            echo "::error::Bundle suspiciously small ($BYTES bytes) — Whisper / Qt deps likely missing."
            exit 1
          fi

      - name: Build .dmg
        # hdiutil is built into macOS — build a read-only compressed disk
        # image with the .app + a symlink to /Applications for drag-install.
        run: |
          set -e
          STAGE="dist/dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R "dist/Sonar.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          # Resolve version from the same place the spec reads it.
          VERSION=$(python -c "exec(open('synapse_voice/__init__.py').read()); print(__version__)")
          echo "Using version: $VERSION"
          DMG="dist/Sonar-$VERSION-arm64.dmg"
          hdiutil create -volname "Sonar" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          ls -la dist/*.dmg

      - name: Zip .app for direct download
        run: |
          set -e
          cd dist
          # Use ditto (Apple's preferred tool) — preserves metadata + symlinks
          # better than the BSD `zip`, which can corrupt code-sign-able files.
          ditto -c -k --keepParent "Sonar.app" "synapse-voice-macos-arm64.zip"
          ls -la synapse-voice-macos-arm64.zip

      - name: Upload macOS arm64 artefacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            dist/Sonar-*-arm64.dmg
            dist/synapse-voice-macos-arm64.zip
          if-no-files-found: error

  release:
    name: Release
    needs: [build-linux, build-windows, build-windows-arm64, build-macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: List artefacts
        run: ls -la artefacts/**/*

      - name: Compute SHA-256 hashes
        id: hashes
        run: |
          # The auto-updater (synapse_voice/updater.py) parses these out of
          # the release body to verify the installer before launching it as
          # admin. Format: "- <filename>: `<hex>`" — must match the regex
          # in _extract_installer_hash.
          {
            echo "hashes<<EOF"
            echo "## SHA256"
            for f in \
              artefacts/linux-x86_64/synapse-voice-linux-x86_64.tar.gz \
              artefacts/linux-x86_64/SynapseVoice-x86_64.AppImage \
              artefacts/windows-x86_64/synapse-voice-windows-x86_64.zip \
              artefacts/windows-x86_64/SynapseVoice-Setup-*.exe \
              artefacts/windows-arm64/synapse-voice-windows-arm64.zip \
              artefacts/windows-arm64/SynapseVoice-Setup-*-arm64.exe \
              artefacts/macos-arm64/Sonar-*-arm64.dmg \
              artefacts/macos-arm64/synapse-voice-macos-arm64.zip; do
              if [ -f "$f" ]; then
                hash=$(sha256sum "$f" | awk '{print $1}')
                name=$(basename "$f")
                echo "- ${name}: \`${hash}\`"
              fi
            done
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "Computed hashes:"
          grep -A 100 '^hashes<<' $GITHUB_OUTPUT | head -20

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: ${{ steps.hashes.outputs.hashes }}
          files: |
            artefacts/linux-x86_64/synapse-voice-linux-x86_64.tar.gz
            artefacts/linux-x86_64/SynapseVoice-x86_64.AppImage
            artefacts/windows-x86_64/synapse-voice-windows-x86_64.zip
            artefacts/windows-x86_64/SynapseVoice-Setup-*.exe
            artefacts/windows-arm64/synapse-voice-windows-arm64.zip
            artefacts/windows-arm64/SynapseVoice-Setup-*-arm64.exe
            artefacts/macos-arm64/Sonar-*-arm64.dmg
            artefacts/macos-arm64/synapse-voice-macos-arm64.zip
